<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRACE 季度深談日｜場控面板</title>
<style>
:root{
  --noir:#1F1611;--espresso:#2A1E14;--gilded:#D4A569;--gilded-light:#E8C88A;
  --surface:#2e2318;--surface2:#382b1c;--surface3:#432f1c;
  --text-primary:#F9F0D6;--text-secondary:#b89a6e;--text-muted:#7a6248;
  --border:rgba(212,165,105,0.18);--border-strong:rgba(212,165,105,0.4);
  --active-glow:rgba(212,165,105,0.08);
  --red:#e05555;--red-bg:rgba(224,85,85,0.12);--red-border:rgba(224,85,85,0.35);
  --green:#1D9E75;--green-bg:rgba(29,158,117,0.12);--green-border:rgba(29,158,117,0.4);
  --ph-pre-color:#7aa8d4;--ph-pre-bg:rgba(122,168,212,0.07);--ph-pre-border:rgba(122,168,212,0.25);--ph-pre-line:rgba(122,168,212,0.4);
  --ph-open-color:#D4A569;--ph-open-bg:rgba(212,165,105,0.07);--ph-open-border:rgba(212,165,105,0.3);--ph-open-line:rgba(212,165,105,0.45);
  --ph-share-color:#e0a030;--ph-share-bg:rgba(224,160,48,0.07);--ph-share-border:rgba(224,160,48,0.28);--ph-share-line:rgba(224,160,48,0.4);
  --ph-ex-color:#e07060;--ph-ex-bg:rgba(224,112,96,0.07);--ph-ex-border:rgba(224,112,96,0.28);--ph-ex-line:rgba(224,112,96,0.4);
  --ph-end-color:#1D9E75;--ph-end-bg:rgba(29,158,117,0.07);--ph-end-border:rgba(29,158,117,0.25);--ph-end-line:rgba(29,158,117,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--noir);color:var(--text-primary);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--espresso);border-bottom:1px solid var(--border-strong);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:13px;font-weight:600;color:var(--gilded);letter-spacing:1px;}
.topbar-sub{font-size:11px;color:var(--text-secondary);margin-top:1px;}
.topbar-right{display:flex;gap:7px;}

/* BUTTONS */
.btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--gilded);}
.btn-gold{background:var(--gilded);color:var(--noir);border-color:var(--gilded);font-weight:600;}
.btn-gold:hover{background:var(--gilded-light);color:var(--noir);}
.btn-red{border-color:var(--red-border);color:var(--red);}
.btn-red:hover{background:var(--red-bg);}
.btn-green{border-color:var(--green-border);color:var(--green);}
.btn-green:hover{background:var(--green-bg);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--espresso);padding:0 20px;overflow-x:auto;}
.tab{padding:10px 15px;font-size:12px;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--gilded);border-bottom-color:var(--gilded);}
.tab:hover:not(.active){color:var(--text-secondary);}

/* PAGES */
.page{display:none;padding:16px 20px;max-width:920px;margin:0 auto;}
.page.active{display:block;}

/* LIVE HEADER */
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
.live-clock{font-size:28px;font-weight:700;color:var(--gilded);letter-spacing:2px;font-variant-numeric:tabular-nums;}
.live-date{font-size:11px;color:var(--text-muted);margin-top:2px;}
.live-next{font-size:11px;color:var(--text-secondary);text-align:right;line-height:1.5;}
.live-next strong{color:var(--gilded);display:block;font-size:13px;}

/* MEETING TIMER */
.meeting-timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.mt-label{font-size:11px;color:var(--text-secondary);white-space:nowrap;}
.mt-display{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--gilded);min-width:90px;}
.mt-adj-input{width:46px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;color:var(--text-primary);text-align:center;font-family:inherit;}
.mt-adj-input:focus{outline:none;border-color:var(--gilded);}

/* TIMELINE */
.tl-item{display:flex;gap:0;position:relative;}
.tl-time{width:72px;flex-shrink:0;text-align:right;padding-right:14px;padding-top:14px;}
.tl-time-label{font-size:13px;font-variant-numeric:tabular-nums;font-weight:700;}
.tl-track{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:18px;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:18px;flex-shrink:0;}
.tl-dot.purple{background:#7F77DD;}.tl-dot.teal{background:#1D9E75;}
.tl-dot.amber{background:#BA7517;}.tl-dot.coral{background:#D85A30;}
.tl-dot.gray{background:#555;}.tl-dot.gold{background:var(--gilded);}
.tl-line{width:2px;flex:1;min-height:14px;}
.tl-content{flex:1;padding:10px 14px 10px 16px;margin-bottom:6px;border-radius:10px;transition:all .3s;border:1px solid transparent;border-left:3px solid transparent;}
.tl-content.is-past{opacity:.32;}
.tl-section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:16px 0 5px 104px;}

/* Phase colors */
.tl-content[data-phase="pre"]{border-left-color:var(--ph-pre-line);}
.tl-content[data-phase="open"]{border-left-color:var(--ph-open-line);}
.tl-content[data-phase="share"]{border-left-color:var(--ph-share-line);}
.tl-content[data-phase="ex"]{border-left-color:var(--ph-ex-line);}
.tl-content[data-phase="end"]{border-left-color:var(--ph-end-line);}
.tl-content[data-phase="pre"].is-active{background:var(--ph-pre-bg);border-color:var(--ph-pre-border);border-left-color:var(--ph-pre-color);}
.tl-content[data-phase="open"].is-active{background:var(--ph-open-bg);border-color:var(--ph-open-border);border-left-color:var(--ph-open-color);}
.tl-content[data-phase="share"].is-active{background:var(--ph-share-bg);border-color:var(--ph-share-border);border-left-color:var(--ph-share-color);}
.tl-content[data-phase="ex"].is-active{background:var(--ph-ex-bg);border-color:var(--ph-ex-border);border-left-color:var(--ph-ex-color);}
.tl-content[data-phase="end"].is-active{background:var(--ph-end-bg);border-color:var(--ph-end-border);border-left-color:var(--ph-end-color);}
.tl-section-label[data-phase="pre"]{color:var(--ph-pre-color);}
.tl-section-label[data-phase="open"]{color:var(--ph-open-color);}
.tl-section-label[data-phase="share"]{color:var(--ph-share-color);}
.tl-section-label[data-phase="ex"]{color:var(--ph-ex-color);}
.tl-section-label[data-phase="end"]{color:var(--ph-end-color);}

/* Node header */
.node-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px;}
.node-header-left{flex:1;min-width:0;}
.tl-title{font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:2px;}
.tl-dur{font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px;}
.tl-bullets{font-size:12px;color:var(--text-secondary);line-height:1.9;padding-left:14px;margin-bottom:8px;}
.tl-bullets li{margin-bottom:1px;}
.node-done-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.node-done-btn:hover{border-color:var(--green);color:var(--green);}
.node-done-btn.active{background:rgba(29,158,117,0.15);border-color:var(--green);color:var(--green);}
.tl-content.node-completed{opacity:0.38;}

/* BADGES */
.action-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.abadge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;}
.ab-announce{background:rgba(122,168,212,.18);color:#7aa8d4;border:1px solid rgba(122,168,212,.3);}
.ab-host{background:rgba(212,165,105,.18);color:var(--gilded);border:1px solid rgba(212,165,105,.3);}
.ab-chat{background:rgba(125,186,138,.18);color:#7dba8a;border:1px solid rgba(125,186,138,.3);}
.ab-watch{background:rgba(136,135,128,.13);color:#888780;border:1px solid rgba(136,135,128,.25);}
.ab-timer-badge{background:rgba(224,138,74,.15);color:#e08a4a;border:1px solid rgba(224,138,74,.28);}
.ab-royal{background:rgba(127,119,221,.18);color:#9d97e8;border:1px solid rgba(127,119,221,.3);}
.ab-photo{background:rgba(29,158,117,.15);color:#1D9E75;border:1px solid rgba(29,158,117,.28);}

/* SEGMENT TIMER */
.seg-timer{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.seg-timer.running{border-color:rgba(212,165,105,.5);}
.seg-timer.overtime{border-color:var(--red-border);background:var(--red-bg);}
.seg-time-display{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--gilded);min-width:72px;}
.seg-timer.overtime .seg-time-display{color:var(--red);}
.seg-timer-label{font-size:11px;color:var(--text-secondary);}
.seg-timer-limit{font-size:10px;color:var(--text-muted);margin-top:1px;}
.seg-timer.overtime .seg-timer-limit{color:var(--red);}
.seg-timer-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.seg-adj{width:52px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:11px;color:var(--text-primary);text-align:center;font-family:inherit;}
.seg-adj:focus{outline:none;border-color:var(--gilded);}
.seg-adj-label{font-size:10px;color:var(--text-muted);}

/* ACTION BLOCKS */
.action-blocks{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.action-block{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.action-block-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none;gap:8px;}
.action-block-header:hover{background:var(--surface2);}
.abl{font-size:12px;font-weight:600;flex:1;}
.abl-host{color:var(--gilded);}.abl-chat{color:#7dba8a;}.abl-copy{color:#7aa8d4;}.abl-royal{color:#9d97e8;}
.ach{font-size:9px;color:var(--text-muted);transition:transform .2s;flex-shrink:0;pointer-events:none;}
.action-block.open .ach{transform:rotate(180deg);}
.action-body{display:none;padding:0 12px 12px;}
.action-block.open .action-body{display:block;}
.action-text{font-size:12px;color:var(--text-secondary);line-height:1.9;white-space:pre-wrap;border:1px solid var(--border);border-radius:6px;padding:12px 14px;background:var(--espresso);margin-top:8px;}
.copy-btn{margin-top:8px;font-size:12px;padding:7px 14px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--gilded);cursor:pointer;transition:all .15s;width:100%;}
.copy-btn:hover{background:var(--gilded);color:var(--noir);font-weight:600;}
.copy-btn.copied,.exposed-copy-btn.copied,.exposed-chat-btn.copied,.exposed-royal-btn.copied{background:var(--green);border-color:var(--green);color:#fff;}
.done-btn{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;flex-shrink:0;}
.done-btn:hover{border-color:var(--green);color:var(--green);}
.done-btn.done-active{background:rgba(29,158,117,0.15);border-color:var(--green);color:var(--green);}

/* Exposed blocks */
.action-block.exposed{border-color:rgba(122,168,212,0.3);background:rgba(122,168,212,0.05);}
.action-block.exposed-chat{border-color:rgba(125,186,138,0.3);background:rgba(125,186,138,0.05);}
.action-block.exposed-royal{border-color:rgba(127,119,221,0.3);background:rgba(127,119,221,0.05);}
.exposed-label{font-size:12px;font-weight:600;flex:1;}
.exposed-copy-btn{font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;border:1px solid rgba(122,168,212,0.4);background:rgba(122,168,212,0.1);color:#7aa8d4;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.exposed-copy-btn:hover{background:#7aa8d4;color:var(--noir);}
.exposed-chat-btn{font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;border:1px solid rgba(125,186,138,0.4);background:rgba(125,186,138,0.1);color:#7dba8a;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.exposed-chat-btn:hover{background:#7dba8a;color:var(--noir);}
.exposed-royal-btn{font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;border:1px solid rgba(127,119,221,0.4);background:rgba(127,119,221,0.1);color:#9d97e8;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.exposed-royal-btn:hover{background:#9d97e8;color:var(--noir);}

/* CHECKLIST */
.check-group{margin-bottom:22px;}
.check-group-title{font-size:11px;font-weight:600;color:var(--gilded);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:5px;cursor:pointer;transition:all .15s;}
.check-item:hover{border-color:var(--border-strong);}
.check-item.done{opacity:.45;}
.check-box{width:16px;height:16px;border-radius:4px;border:1px solid var(--border-strong);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
.check-item.done .check-box{background:var(--gilded);border-color:var(--gilded);}
.check-tick{font-size:10px;color:var(--noir);display:none;}
.check-item.done .check-tick{display:block;}
.check-text{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.check-item.done .check-text{text-decoration:line-through;color:var(--text-muted);}
.check-time{font-size:10px;color:var(--gilded);font-weight:600;margin-bottom:2px;}

/* EDIT */
.edit-section{margin-bottom:26px;}
.edit-section-title{font-size:11px;font-weight:600;color:var(--gilded);letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.edit-item{margin-bottom:14px;}
.edit-label{font-size:11px;color:var(--text-secondary);margin-bottom:5px;}
.edit-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text-primary);font-family:inherit;resize:vertical;min-height:36px;transition:border .15s;line-height:1.7;}
.edit-input:focus{outline:none;border-color:var(--gilded);}
.edit-input.tall{min-height:80px;}
.save-bar{position:sticky;bottom:0;background:var(--espresso);border-top:1px solid var(--border-strong);padding:11px 20px;display:flex;justify-content:flex-end;gap:8px;z-index:50;}

/* SETUP */
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;}
.setup-card-title{font-size:13px;font-weight:600;color:var(--gilded);margin-bottom:13px;}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
@media(max-width:560px){.setup-row{grid-template-columns:1fr;}}
.session-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:6px;}
.sr-name{font-size:12px;font-weight:600;color:var(--text-secondary);}
.sr-name.cur{color:var(--gilded);}
.sr-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}

/* ATTENDANCE */
.att-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.att-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.att-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;flex:1;min-width:100px;}
.att-stat-num{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
.att-stat-label{font-size:11px;color:var(--text-muted);}
.att-stat.total .att-stat-num{color:var(--gilded);}
.att-stat.present .att-stat-num{color:var(--green);}
.att-stat.absent .att-stat-num{color:var(--red);}
.att-stat.spoke .att-stat-num{color:#9d97e8;}
.att-stat.egg .att-stat-num{color:#e0a030;}
.att-table{width:100%;}
.att-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:5px;}
.att-row.present-row{border-color:rgba(29,158,117,0.25);background:rgba(29,158,117,0.04);}
.att-row.absent-row{opacity:0.45;}
.att-name{font-size:16px;font-weight:700;color:var(--text-primary);flex:1;}
.att-account{font-size:11px;color:var(--text-muted);flex:1;}
.att-btns{display:flex;gap:5px;flex-shrink:0;}
.att-btn{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;font-weight:600;}
.att-btn.present{color:var(--green);border-color:var(--green-border);}
.att-btn.present.active{background:rgba(29,158,117,0.2);}
.att-btn.absent{color:var(--red);border-color:var(--red-border);}
.att-btn.absent.active{background:var(--red-bg);}
.att-btn.spoke{color:#9d97e8;border-color:rgba(157,151,232,0.4);}
.att-btn.spoke.active{background:rgba(157,151,232,0.15);}
.att-search{width:100%;background:var(--surface2);border:1px solid var(--border-strong);border-radius:8px;padding:9px 14px;font-size:14px;color:var(--text-primary);font-family:inherit;transition:border .15s;}
.att-search:focus{outline:none;border-color:var(--gilded);}
.att-search-wrap{position:relative;margin-bottom:12px;}
.att-search-hint{font-size:12px;color:var(--text-muted);margin-top:5px;min-height:18px;transition:color .2s;}
.att-row.highlight{border-color:var(--gilded);background:rgba(212,165,105,0.1);}
.att-paste-area{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-primary);font-family:inherit;resize:vertical;min-height:80px;line-height:1.7;}
.att-paste-area:focus{outline:none;border-color:var(--gilded);}
.egg-input{width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:14px;font-weight:700;color:var(--gilded);text-align:center;font-family:inherit;}
.egg-input:focus{outline:none;border-color:var(--gilded);}

/* REPORT */
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.report-section-title{font-size:12px;font-weight:600;color:var(--gilded);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px;}
.kpi-card{background:var(--espresso);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;}
.kpi-num{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:4px;}
.kpi-label{font-size:11px;color:var(--text-muted);}
.kpi-card.k-total .kpi-num{color:var(--gilded);}
.kpi-card.k-present .kpi-num{color:var(--green);}
.kpi-card.k-absent .kpi-num{color:var(--red);}
.kpi-card.k-spoke .kpi-num{color:#9d97e8;}
.kpi-card.k-egg .kpi-num{color:#e0a030;}
.kpi-card.k-rate .kpi-num{color:var(--ph-share-color);}
.bar-wrap{margin-bottom:10px;}
.bar-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:4px;}
.bar-track{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease;}
.bar-fill.present{background:var(--green);}
.bar-fill.spoke{background:#9d97e8;}
.bar-fill.egg{background:#e0a030;}
.notes-input{width:100%;background:var(--espresso);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text-primary);font-family:inherit;resize:vertical;min-height:70px;line-height:1.7;}
.notes-input:focus{outline:none;border-color:var(--gilded);}
.absent-list{font-size:12px;color:var(--text-secondary);line-height:2;}

/* MISC */
.badge-active{display:inline-block;background:var(--gilded);color:var(--noir);font-size:11px;font-weight:700;padding:2px 10px;border-radius:8px;margin-left:8px;animation:pulse 1.5s ease-in-out infinite;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.overtime-flash{animation:oflash 1s ease-in-out infinite;}
@keyframes oflash{0%,100%{opacity:1}50%{opacity:.5}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gilded);color:var(--noir);padding:7px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.no-session{text-align:center;padding:50px 20px;color:var(--text-muted);}
.section-tip{font-size:11px;color:var(--text-muted);margin-bottom:12px;line-height:1.6;}
</style>
</head>
<body>

  <div>
    <div class="topbar-title">G.R.A.C.E. ｜ 場控面板</div>
    <div class="topbar-sub" id="topbar-sub">載入中…</div>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="exportData()">匯出備份</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">匯入</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">

<!-- LIVE -->

  <div class="live-header">
    <div>
      <div class="live-clock" id="live-clock">--:--:--</div>

<!-- ATTENDANCE -->

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let state={sessions:[],currentId:null};
const KEY='grace_livecontrol_v4';
const save=()=>localStorage.setItem(KEY,JSON.stringify(state));
const load=()=>{
  try{
    // Try current key first
    let r=localStorage.getItem(KEY);
    // Migrate from old keys if needed
    if(!r){
      r=localStorage.getItem('grace_livecontrol_v3')||
        localStorage.getItem('grace_livecontrol_v2')||
        localStorage.getItem('grace_livecontrol_v1');
    }
    if(r){
      const parsed=JSON.parse(r);
      // Migrate: ensure all sessions have attendance field
      if(parsed.sessions){
        parsed.sessions.forEach(s=>{
          if(!s.attendance)s.attendance={members:[],eggCount:0,notes:''};
          if(!s.checkState)s.checkState={};
        });
      }
      state=parsed;
      localStorage.setItem(KEY,JSON.stringify(state));
    }
  }catch(e){}
};
const cur=()=>state.sessions.find(s=>s.id===state.currentId)||null;

// ═══════════════════════════════════
// MEETING TIMER
// ═══════════════════════════════════
let mtInterval=null,mtStartEpoch=null;
const pad=n=>String(n).padStart(2,'0');

function mtTick(){
  if(mtStartEpoch===null)return;
  const e=Math.floor((Date.now()-mtStartEpoch)/1000);
  document.getElementById('mt-display').textContent=`${pad(Math.floor(e/3600))}:${pad(Math.floor(e%3600/60))}:${pad(e%60)}`;
}
function mtStart(){
  if(mtInterval)return;
  mtStartEpoch=Date.now();
  mtInterval=setInterval(mtTick,1000);
  const b=document.getElementById('mt-start-btn');
  b.textContent='計時中…';b.disabled=true;
}
function mtSetManual(){
  const h=parseInt(document.getElementById('mt-adj-h').value)||0;
  const m=parseInt(document.getElementById('mt-adj-m').value)||0;
  const now=new Date(),start=new Date(now);
  start.setHours(h,m,0,0);
  if(start>now)start.setDate(start.getDate()-1);
  mtStartEpoch=start.getTime();
  if(!mtInterval){mtInterval=setInterval(mtTick,1000);const b=document.getElementById('mt-start-btn');b.textContent='計時中…';b.disabled=true;}
  mtTick();showToast(`已從 ${pad(h)}:${pad(m)} 開始計算`);
}
function mtReset(){
  clearInterval(mtInterval);mtInterval=null;mtStartEpoch=null;
  document.getElementById('mt-display').textContent='00:00:00';
  const b=document.getElementById('mt-start-btn');b.textContent='開始計時';b.disabled=false;
}

// ═══════════════════════════════════
// SEGMENT TIMERS
// ═══════════════════════════════════
const segTimers={};

function segStart(nodeId){
  if(segTimers[nodeId]?.interval)return;
  const s=cur();if(!s)return;
  const node=s.nodes.find(n=>n.id===nodeId);if(!node)return;
  const limitSec=(node.timerMin||10)*60;
  if(!segTimers[nodeId])segTimers[nodeId]={startEpoch:Date.now(),limitSec,interval:null,pausedAt:0};
  else segTimers[nodeId].startEpoch=Date.now()-(segTimers[nodeId].pausedAt||0);
  segTimers[nodeId].interval=setInterval(()=>segTick(nodeId),1000);
  segTick(nodeId);
  const sb=document.getElementById(`st-start-${nodeId}`),pb=document.getElementById(`st-stop-${nodeId}`);
  if(sb){sb.textContent='計時中…';sb.disabled=true;}
  if(pb)pb.style.display='inline-block';
}
function segStop(nodeId){
  const t=segTimers[nodeId];if(!t)return;
  clearInterval(t.interval);t.interval=null;
  t.pausedAt=Date.now()-t.startEpoch;
  const sb=document.getElementById(`st-start-${nodeId}`),pb=document.getElementById(`st-stop-${nodeId}`);
  if(sb){sb.textContent='繼續';sb.disabled=false;}
  if(pb)pb.style.display='none';
}
function segSetManual(nodeId){
  const adjEl=document.getElementById(`st-adj-${nodeId}`);if(!adjEl)return;
  const parts=adjEl.value.split(':').map(x=>parseInt(x)||0);
  let elapsed=parts.length>=2?parts[0]*60+parts[1]:parts[0]*60;
  const s=cur();const node=s?.nodes.find(n=>n.id===nodeId);
  segTimers[nodeId]={startEpoch:Date.now()-elapsed*1000,limitSec:(node?.timerMin||10)*60,interval:null,pausedAt:0};
  if(!segTimers[nodeId].interval){
    segTimers[nodeId].interval=setInterval(()=>segTick(nodeId),1000);
    const sb=document.getElementById(`st-start-${nodeId}`),pb=document.getElementById(`st-stop-${nodeId}`);
    if(sb){sb.textContent='計時中…';sb.disabled=true;}
    if(pb)pb.style.display='inline-block';
  }
  segTick(nodeId);showToast('已套用手動時間');
}
function segReset(nodeId){
  if(segTimers[nodeId]?.interval)clearInterval(segTimers[nodeId].interval);
  delete segTimers[nodeId];
  const d=document.getElementById(`st-disp-${nodeId}`);
  const box=document.getElementById(`st-box-${nodeId}`);
  const sb=document.getElementById(`st-start-${nodeId}`);
  const pb=document.getElementById(`st-stop-${nodeId}`);
  const lim=document.getElementById(`st-limit-${nodeId}`);
  if(d){d.textContent='00:00';d.style.color='var(--gilded)';}
  if(box)box.classList.remove('running','overtime');
  if(sb){sb.textContent='開始';sb.disabled=false;}
  if(pb)pb.style.display='none';
  if(lim)lim.classList.remove('overtime-flash');
}
function segTick(nodeId){
  const t=segTimers[nodeId];if(!t)return;
  const el=Math.floor((Date.now()-t.startEpoch)/1000);
  const m=Math.floor(el/60),s=el%60;
  const d=document.getElementById(`st-disp-${nodeId}`);
  const box=document.getElementById(`st-box-${nodeId}`);
  const lim=document.getElementById(`st-limit-${nodeId}`);
  if(!d){clearInterval(t.interval);return;}
  d.textContent=`${pad(m)}:${pad(s)}`;
  const over=el>t.limitSec;
  d.style.color=over?'var(--red)':'var(--gilded)';
  if(box){box.classList.toggle('running',!over);box.classList.toggle('overtime',over);}
  if(lim)lim.classList.toggle('overtime-flash',over);
}

// ═══════════════════════════════════
// BLOCK TEXT MAP + COPY
// ═══════════════════════════════════
const blockTextMap={};

function copyBlock(uid,btn){
  const txt=blockTextMap[uid]||'';
  if(!txt){showToast('找不到文字');return;}
  const orig=btn.textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='✓ 已複製';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},1800);
    showToast('已複製到剪貼簿');
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='✓ 已複製';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},1800);
    showToast('已複製到剪貼簿');
  });
}

// ═══════════════════════════════════
// DONE / CHECK STATE
// ═══════════════════════════════════
function toggleDone(doneKey){
  const s=cur();if(!s)return;
  s.checkState[doneKey]=!s.checkState[doneKey];
  autoCheckNode(s,doneKey);
  save();renderTimeline();
}
function toggleNodeDone(nodeId){
  const s=cur();if(!s)return;
  const key=`node_done_${nodeId}`;
  s.checkState[key]=!s.checkState[key];
  save();renderTimeline();
}
function autoCheckNode(s,changedKey){
  const match=changedKey.match(/^done_(.+)_(\d+)$/);
  if(!match)return;
  const nodeId=match[1];
  const node=s.nodes.find(n=>n.id===nodeId);
  if(!node||!node.blocks.length)return;
  const allDone=node.blocks.every((_,bi)=>s.checkState[`done_${nodeId}_${bi}`]);
  if(allDone)s.checkState[`node_done_${nodeId}`]=true;
}

// ═══════════════════════════════════
// ATTENDANCE
// ═══════════════════════════════════
function getAttData(){
  const s=cur();return s?.attendance||{members:[],eggCount:0,notes:''};
}
function parseAttendance(){
  const s=cur();if(!s)return;
  const raw=document.getElementById('att-paste').value.trim();
  if(!raw){showToast('請先貼上名單');return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const members=lines.map(line=>{
    const parts=line.split(/\s+/);
    const name=parts[0]||'';
    const account=parts.slice(1).join(' ')||'';
    return{name,account,status:'pending',spoke:false};
  });
  if(!s.attendance)s.attendance={members:[],eggCount:0,notes:''};
  s.attendance.members=members;
  save();renderAttendance();renderReport();
  document.getElementById('att-paste').value='';
  showToast(`已匯入 ${members.length} 位學員`);
}
function markAllPresent(){
  const s=cur();if(!s||!s.attendance)return;
  s.attendance.members.forEach(m=>m.status='present');
  save();renderAttendance();renderReport();
}
function clearAttendance(){
  if(!confirm('確定清除名單？'))return;
  const s=cur();if(!s)return;
  if(s.attendance)s.attendance.members=[];
  save();renderAttendance();renderReport();
}
function setStatus(idx,status){
  const s=cur();if(!s||!s.attendance)return;
  const m=s.attendance.members[idx];if(!m)return;
  m.status=m.status===status?'pending':status;
  save();renderAttendance();renderReport();
}
function toggleSpoke(idx){
  const s=cur();if(!s||!s.attendance)return;
  const m=s.attendance.members[idx];if(!m)return;
  m.spoke=!m.spoke;
  save();renderAttendance();renderReport();
}
function searchKeydown(e){
  if(e.key!=='Enter')return;
  const val=e.target.value.trim();
  if(!val)return;
  const s=cur();if(!s||!s.attendance)return;
  const members=s.attendance.members;
  const matches=members.map((m,i)=>({m,i})).filter(({m})=>m.name.includes(val));
  if(matches.length===1){
    const {m,i}=matches[0];
    m.status='present';
    save();renderAttendance();
    // Clear input and show confirmation
    e.target.value='';
    const hint=document.getElementById('att-search-hint');
    if(hint){hint.textContent='✓ 已標記「'+m.name+'」出席，繼續輸入下一位';hint.style.color='var(--green)';}
    setTimeout(()=>{const h=document.getElementById('att-search-hint');if(h){h.textContent='';h.style.color='';}},2000);
  } else if(matches.length===0){
    const hint=document.getElementById('att-search-hint');
    if(hint){hint.textContent='找不到「'+val+'」，請確認姓名';hint.style.color='var(--red)';}
  } else {
    const hint=document.getElementById('att-search-hint');
    if(hint){hint.textContent='找到 '+matches.length+' 筆（'+matches.map(x=>x.m.name).join('、')+'），請輸入完整姓名';hint.style.color='var(--gilded)';}
  }
}

function searchAndMark(val){
  const s=cur();if(!s||!s.attendance)return;
  const hint=document.getElementById('att-search-hint');
  // Remove previous highlights
  document.querySelectorAll('.att-row.highlight').forEach(el=>el.classList.remove('highlight'));
  if(!val.trim()){if(hint)hint.textContent='';return;}
  const q=val.trim();
  const members=s.attendance.members;
  // Find matches
  const matches=members.map((m,i)=>({m,i})).filter(({m})=>m.name.includes(q));
  if(!matches.length){
    if(hint)hint.textContent='找不到「'+q+'」';
    return;
  }
  // Highlight and scroll to first match
  matches.forEach(({i})=>{
    const row=document.getElementById('att-row-'+i);
    if(row)row.classList.add('highlight');
  });
  const firstRow=document.getElementById('att-row-'+matches[0].i);
  if(firstRow)firstRow.scrollIntoView({behavior:'smooth',block:'center'});
  // If exact match (one person), auto-mark present
  if(matches.length===1){
    const {m,i}=matches[0];
    if(m.status!=='present'){
      m.status='present';
      save();
      renderAttendance();
      // Re-apply search highlight after re-render
      setTimeout(()=>{
        const row=document.getElementById('att-row-'+i);
        if(row){row.classList.add('highlight');row.scrollIntoView({behavior:'smooth',block:'center'});}
        const h=document.getElementById('att-search-hint');
        if(h)h.textContent='✓ 已標記「'+m.name+'」出席';
      },50);
    } else {
      if(hint)hint.textContent='「'+m.name+'」已出席 ✓';
    }
  } else {
    if(hint)hint.textContent='找到 '+matches.length+' 筆，請繼續輸入或手動點選';
  }
}

function saveEggCount(){
  const s=cur();if(!s)return;
  if(!s.attendance)s.attendance={members:[],eggCount:0,notes:''};
  s.attendance.eggCount=parseInt(document.getElementById('egg-count').value)||0;
  save();renderReport();
}
function saveNotes(){
  const s=cur();if(!s)return;
  if(!s.attendance)s.attendance={members:[],eggCount:0,notes:''};
  s.attendance.notes=document.getElementById('report-notes').value;
  save();
}

function renderAttendance(){
  const s=cur();
  const c=document.getElementById('att-table-container');
  const sc=document.getElementById('att-stats');
  if(!s||!s.attendance||!s.attendance.members.length){
    c.innerHTML='<div style="font-size:12px;color:var(--text-muted);padding:20px 0">尚未匯入名單。貼上學員名單後按「匯入名單」。</div>';
    sc.innerHTML='';return;
  }
  const members=s.attendance.members;
  const total=members.length;
  const present=members.filter(m=>m.status==='present').length;

  const spoke=members.filter(m=>m.spoke).length;

        <button class="att-btn spoke${m.spoke?' active':''}" onclick="toggleSpoke(${i})">發言</button>
      </div>
    </div>`).join('')+'</div>';
}

function renderReport(){
  const s=cur();
  if(!s){document.getElementById('report-kpi').innerHTML='<div style="color:var(--text-muted);font-size:12px">請先建立場次</div>';return;}
  const att=s.attendance||{members:[],eggCount:0,notes:''};
  const members=att.members;
  const total=members.length;
  const present=members.filter(m=>m.status==='present').length;
  const absent=members.filter(m=>m.status==='absent').length;
  const spoke=members.filter(m=>m.spoke).length;
  const egg=att.eggCount||0;
  const attRate=total?Math.round(present/total*100):0;
  const spokeRate=present?Math.round(spoke/present*100):0;
  const eggRate=present?Math.round(egg/present*100):0;

  document.getElementById('report-kpi').innerHTML=`
    <div class="kpi-card k-total"><div class="kpi-num">${total}</div><div class="kpi-label">總報名人數</div></div>
    <div class="kpi-card k-present"><div class="kpi-num">${present}</div><div class="kpi-label">實際出席</div></div>

  document.getElementById('report-bars').innerHTML=`
    <div class="bar-wrap"><div class="bar-label-row"><span>出席率</span><span>${attRate}%（${present}／${total}）</span></div><div class="bar-track"><div class="bar-fill present" style="width:${attRate}%"></div></div></div>

    <div class="bar-wrap"><div class="bar-label-row"><span>彩蛋轉換率（佔出席）</span><span>${eggRate}%（${egg}／${present||1}）</span></div><div class="bar-track"><div class="bar-fill egg" style="width:${eggRate}%"></div></div></div>`;

  const absentList=members.filter(m=>m.status==='absent').map(m=>m.name).join('、');
  document.getElementById('report-absent').textContent=absentList||'（無缺席）';

  const eggEl=document.getElementById('egg-count');
  if(eggEl&&eggEl!==document.activeElement)eggEl.value=egg;
  const notesEl=document.getElementById('report-notes');
  if(notesEl&&notesEl!==document.activeElement)notesEl.value=att.notes||'';
}

// RENDER TIMELINE
// ═══════════════════════════════════
const nowMin=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};
const badgeCls={announce:'ab-announce',host:'ab-host',chat:'ab-chat',watch:'ab-watch','timer-badge':'ab-timer-badge',royal:'ab-royal',photo:'ab-photo'};
const blCls={host:'abl-host',chat:'abl-chat',copy:'abl-copy',royal:'abl-royal'};

function renderTimeline(){
  const s=cur();
  const container=document.getElementById('timeline-container');
  if(!s){container.innerHTML='<div class="no-session"><div style="font-size:14px;margin-bottom:14px">還沒有場次</div><button class="btn btn-gold" onclick="switchTab(\'setup\')">建立場次</button></div>';return;}
  const nm=nowMin();
  let activeIdx=-1;
  s.nodes.forEach((n,i)=>{const nxt=i+1<s.nodes.length?s.nodes[i+1].timeMin:24*60;if(nm>=n.timeMin&&nm<nxt)activeIdx=i;});

  let html='',lastSec='';
  s.nodes.forEach((node,idx)=>{
    const phase=phaseMap[node.id]||'pre';
    if(node.section&&node.section!==lastSec){html+='<div class="tl-section-label" data-phase="'+phase+'">&#9658; '+node.section+'</div>';lastSec=node.section;}
    const isActive=idx===activeIdx,isPast=idx<activeIdx;
    const nodeCompleted=!!(s.checkState['node_done_'+node.id]);
    let cc='tl-content';
    if(isActive)cc+=' is-active';
    else if(isPast)cc+=' is-past';
    if(nodeCompleted)cc+=' node-completed';

    const badgesHtml=node.badges.map(b=>'<span class="abadge '+(badgeCls[b.t]||'')+'">'+b.l+'</span>').join('');
    const bulletsHtml=node.bullets.length?'<ul class="tl-bullets">'+node.bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul>':'';

    let timerHtml='';
    if(node.hasTimer){
      const t=segTimers[node.id],running=!!t;
      const elapsed=running?Math.floor((Date.now()-t.startEpoch)/1000):0;
      const em=Math.floor(elapsed/60),es=elapsed%60;
      const over=running&&elapsed>(node.timerMin||10)*60;
      const dispVal=running?(pad(em)+':'+pad(es)):'00:00';
      timerHtml='<div class="seg-timer'+(running&&!over?' running':'')+(over?' overtime':'')+'" id="st-box-'+node.id+'">'
        +'<div class="seg-time-display" id="st-disp-'+node.id+'" style="color:'+(over?'var(--red)':'var(--gilded)')+'">'+dispVal+'</div>'
        +'<div style="flex:1"><div class="seg-timer-label">分享計時器</div>'
        +'<div class="seg-timer-limit'+(over?' overtime-flash':'')+'" id="st-limit-'+node.id+'">預計 '+node.timerMin+' 分鐘'+(over?' &#9888; 已超時':'')+'</div></div>'
        +'<div class="seg-timer-controls">'
        +'<span class="seg-adj-label">從</span>'
        +'<input class="seg-adj" id="st-adj-'+node.id+'" placeholder="分:秒">'
        +'<button class="btn btn-green" id="st-start-'+node.id+'" onclick="segStart(\''+node.id+'\')" '+(running?'disabled':'')+' style="font-size:11px;padding:4px 10px">'+(running?'計時中…':'開始')+'</button>'
        +'<button class="btn" id="st-stop-'+node.id+'" onclick="segStop(\''+node.id+'\')" style="font-size:11px;padding:4px 10px;display:'+(running?'inline-block':'none')+'">暫停</button>'
        +'<button class="btn" onclick="segSetManual(\''+node.id+'\')" style="font-size:11px;padding:4px 10px">套用</button>'
        +'<button class="btn btn-red" onclick="segReset(\''+node.id+'\')" style="font-size:11px;padding:4px 10px">重置</button>'
        +'</div></div>';
    }

    const blocksHtml=node.blocks.map(function(bl,bi){
      const uid=node.id+'_'+bi;
      blockTextMap[uid]=s.texts[bl.key]||'';
      const txt=blockTextMap[uid];
      const doneKey='done_'+node.id+'_'+bi;
      const isDone=!!(s.checkState[doneKey]);
      const doneStyle=isDone?'opacity:0.45;':'';
      const doneMark=isDone?' <span style="color:var(--green)">✓</span>':'';

      if(bl.type==='copy'||bl.type==='chat'||bl.type==='royal'){
        const cls=bl.type==='copy'?'exposed':bl.type==='chat'?'exposed-chat':'exposed-royal';
        const btnCls=bl.type==='copy'?'exposed-copy-btn':bl.type==='chat'?'exposed-chat-btn':'exposed-royal-btn';
        const labelCls=bl.type==='copy'?'abl-copy':bl.type==='chat'?'abl-chat':'abl-royal';
        return '<div class="action-block '+cls+'" id="ab_'+uid+'" style="'+doneStyle+'">'
          +'<div class="action-block-header" onclick="toggleBlock(\'ab_'+uid+'\')">'
          +'<span class="exposed-label '+labelCls+'">'+bl.label+doneMark+'</span>'
          +'<div style="display:flex;gap:6px;align-items:center;flex-shrink:0" onclick="event.stopPropagation()">'
          +'<button class="'+btnCls+'" onclick="copyBlock(\''+uid+'\',this)">複製</button>'
          +'<button class="done-btn'+(isDone?' done-active':'')+'" onclick="toggleDone(\''+doneKey+'\')" title="標記完成">✓</button>'
          +'<span class="ach">&#9660;</span>'
          +'</div></div>'
          +'<div class="action-body"><div class="action-text">'+esc(txt)+'</div></div>'
          +'</div>';
      }
      return '<div class="action-block" id="ab_'+uid+'" style="'+doneStyle+'">'
        +'<div class="action-block-header" onclick="toggleBlock(\'ab_'+uid+'\')">'
        +'<span class="abl '+(blCls[bl.type]||'')+'">'+bl.label+doneMark+'</span>'
        +'<div style="display:flex;gap:6px;align-items:center;flex-shrink:0" onclick="event.stopPropagation()">'
        +'<button class="done-btn'+(isDone?' done-active':'')+'" onclick="toggleDone(\''+doneKey+'\')" title="標記完成">✓</button>'
        +'<span class="ach">&#9660;</span>'
        +'</div></div>'
        +'<div class="action-body">'
        +'<div class="action-text">'+esc(txt)+'</div>'
        +'<button class="copy-btn" onclick="copyBlock(\''+uid+'\',this)">複製口稿</button>'
        +'</div></div>';
    }).join('');

    html+='<div class="tl-item">'
      +'<div class="tl-time"><span class="tl-time-label" style="color:'+(phaseLineColor[phase]||'var(--text-secondary)')+'">'+node.timeLabel+'</span></div>'
      +'<div class="tl-track"><div class="tl-dot '+node.dot+'"></div><div class="tl-line" style="background:'+phaseLineColor[phase]+'33"></div></div>'
      +'<div class="'+cc+'" data-phase="'+phase+'">'
      +'<div class="node-header">'
      +'<div class="node-header-left">'
      +'<div class="action-badges">'+badgesHtml+'</div>'
      +'<div class="tl-title">'+node.title+(isActive?'<span class="badge-active">NOW</span>':'')+'</div>'
      +'<div class="tl-dur">'+node.dur+'</div>'
      +'</div>'
      +'<button class="node-done-btn'+(nodeCompleted?' active':'')+'" onclick="toggleNodeDone(\''+node.id+'\')">'+(nodeCompleted?'✓ 完成':'○ 完成')+'</button>'
      +'</div>'
      +bulletsHtml+timerHtml
      +(blocksHtml?'<div class="action-blocks">'+blocksHtml+'</div>':'')
      +'</div></div>';
  });

  container.innerHTML=html;
  if(activeIdx>=0)setTimeout(function(){var el=container.querySelector('.is-active');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},80);
  var next=activeIdx>=0&&activeIdx+1<s.nodes.length?s.nodes[activeIdx+1]:null;
  document.getElementById('live-next').innerHTML=next?'下一段<strong>'+next.timeLabel+' '+next.title+'</strong>':'<strong>場次進行中</strong>';
}

function renderChecklist(){
  const s=cur();const c=document.getElementById('checklist-container');
  if(!s){c.innerHTML='<div class="no-session"><div style="font-size:12px">請先建立場次</div></div>';return;}
  const groups=[{key:'before',title:'前置作業'},{key:'during',title:'場中確認'},{key:'after',title:'會後作業'}];
  c.innerHTML=groups.map(function(g){
    const items=s.checklist[g.key]||[];
    return '<div class="check-group"><div class="check-group-title">&#9658; '+g.title+'</div>'
      +items.map(function(item){const done=s.checkState[item.id]||false;
        return '<div class="check-item '+(done?'done':'')+'" onclick="toggleCheck(\''+item.id+'\')">'
          +'<div class="check-box"><span class="check-tick">✓</span></div>'
          +'<div><div class="check-time">'+item.time+'</div><div class="check-text">'+item.text+'</div></div>'
          +'</div>';}).join('')+'</div>';}).join('');
}

  const speakers=spRaw?spRaw.split(',').map(function(x){return x.trim();}).filter(Boolean):[];
  const tmap={};
  tmRaw.split(',').forEach(function(p){const kv=p.split(':');if(kv[0]&&kv[1])tmap[kv[0].trim()]=kv[1].trim();});
  const s=buildSession(name,theme,dateStr,speakers,tmap);
  state.sessions.unshift(s);state.currentId=s.id;save();showToast('場次建立成功！');switchTab('live');
}

function switchSession(id){state.currentId=id;save();renderAll();switchTab('live');}

function deleteSession(id){
  if(!confirm('確定刪除這個場次？'))return;
  state.sessions=state.sessions.filter(function(s){return s.id!==id;});
  if(state.currentId===id)state.currentId=(state.sessions[0]&&state.sessions[0].id)||null;
  save();renderAll();
}

function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download='grace_場控備份_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){try{state=JSON.parse(ev.target.result);save();renderAll();showToast('匯入成功');}catch(err){showToast('格式錯誤');}};
  r.readAsText(f);e.target.value='';
}

function switchTab(t){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='live')renderTimeline();
  if(t==='checklist')renderChecklist();
  if(t==='edit'){renderEdit();setTimeout(autoHAll,30);}
  if(t==='setup')renderSetup();
  if(t==='attendance')renderAttendance();
  if(t==='report')renderReport();
}

function renderAll(){
  const s=cur();
  document.getElementById('topbar-sub').textContent=s?(s.dateStr+' ｜ '+s.theme):'尚未選擇場次';
  renderTimeline();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

function autoH(el){el.style.height='auto';el.style.height=(el.scrollHeight+6)+'px';}
function autoHAll(){document.querySelectorAll('#edit-container .edit-input.tall').forEach(function(el){autoH(el);});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function tick(){
  const n=new Date();
  const hh=pad(n.getHours()),mm=pad(n.getMinutes()),ss=pad(n.getSeconds());
  document.getElementById('live-clock').textContent=hh+':'+mm+':'+ss;
  document.getElementById('live-date').textContent=n.getFullYear()+'.'+pad(n.getMonth()+1)+'.'+pad(n.getDate())+' （'+'日一二三四五六'[n.getDay()]+'）';
  if(ss==='00')renderTimeline();
  mtTick();
}

function init(){
  load();
  const FID='grace_20260610_emotion';
  let existing=state.sessions.find(function(s){return s.id===FID;});
  if(!existing){
    const s=buildSession('季度深談日・情緒的訊號學','情緒的訊號學','2026-06-10',['倪婍瑄','朱映蓉','黃又庭'],{'倪婍瑄':'內耗','朱映蓉':'自我懷疑','黃又庭':'憤怒'});
    s.id=FID;state.sessions.unshift(s);existing=s;
  }
  if(!existing.nodes||!existing.nodes.length){
    const fresh=buildSession(existing.name||'季度深談日・情緒的訊號學',existing.theme||'情緒的訊號學',existing.dateStr||'2026-06-10',existing.speakers||['倪婍瑄','朱映蓉','黃又庭'],existing.tmap||{'倪婍瑄':'內耗','朱映蓉':'自我懷疑','黃又庭':'憤怒'});
    fresh.id=FID;
    fresh.checkState=existing.checkState||{};
    fresh.attendance=existing.attendance||{members:[],eggCount:0,notes:''};
    const idx=state.sessions.findIndex(function(s){return s.id===FID;});
    if(idx>=0)state.sessions[idx]=fresh;
  }
  state.currentId=FID;
  save();
  renderAll();tick();setInterval(tick,1000);
}

init();
</script>
</body>
</html>
